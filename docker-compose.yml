services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - INSTALL_CHROMIUM=${INSTALL_CHROMIUM:-false}
        - INSTALL_FFMPEG=${INSTALL_FFMPEG:-false}
    container_name: openclaw-lmstudio
    restart: unless-stopped

    # --- Networking ---
    # Expose OpenClaw gateway on host port 18789
    ports:
      - "127.0.0.1:18789:18789"

    # On Linux, host.docker.internal is not available by default.
    # This extra_hosts entry ensures it resolves to the host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # --- Environment ---
    environment:
      - NODE_ENV=production
      # Startup optimization: cache compiled JS, skip self-respawn
      - NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      - OPENCLAW_NO_RESPAWN=1
      - LANG=C.UTF-8
      - PROVIDER=${PROVIDER:-lmstudio}
      # LM Studio provider
      - LMSTUDIO_BASE_URL=http://host.docker.internal:${LMSTUDIO_PORT:-1234}
      - LMSTUDIO_PORT=${LMSTUDIO_PORT:-1234}
      # Claude provider
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Optional runtime dependencies (installed on first start, persist on .local volume)
      - INSTALL_GO=${INSTALL_GO:-false}
      - INSTALL_UV=${INSTALL_UV:-false}
      - INSTALL_NPM_GLOBALS=${INSTALL_NPM_GLOBALS:-false}

    # Run as node user (uid 1000)
    user: "1000:1000"

    # --- Volumes ---
    volumes:
      # Workspace: your project directory mounted read-write
      - ${WORKSPACE_PATH:-./workspace}:/workspace:rw
      # OpenClaw config persistence (settings, memory, skills, logs)
      - ./.openclaw-files/.openclaw:/home/node/.openclaw:rw
      # User-local persistence (binaries installed by openclaw: gh, gog, etc.)
      - ./.openclaw-files/.local:/home/node/.local:rw
      # Runtime config persistence (gh, git, mise, etc.)
      - ./.openclaw-files/.config:/home/node/.config:rw

    working_dir: /workspace

    # --- Security Hardening ---
    # Drop all Linux capabilities, then add back only what's needed
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # Prevent privilege escalation
    security_opt:
      - no-new-privileges:true

    # Writable tmpfs for transient data
    tmpfs:
      - /tmp:size=512m
      - /var/tmp:size=256m
      - /run:size=64m

    # --- Resource Limits ---
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
          pids: 512
        reservations:
          memory: 512m
          cpus: "0.5"

    # --- Healthcheck ---
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

